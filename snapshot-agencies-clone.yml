        - paragraph [ref=e219]: How it works
        - heading "From one language to many in three steps" [level=2] [ref=e220]
        - paragraph [ref=e221]: Set up new locales, translate your content, and publish — all within your existing workflow. No separate tools or platforms required.
      - generic [ref=e222]:
        - generic [ref=e223]:
          - generic [ref=e225]: "01"
          - heading "Setup your locales" [level=3] [ref=e226]
          - paragraph [ref=e227]: Choose the languages and regions you want to target. Configure your default locale, fallback rules, and enable automatic language detection based on visitor browser preferences.
        - generic [ref=e228]:
          - generic [ref=e230]: "02"
          - heading "Translate your content" [level=3] [ref=e231]
          - paragraph [ref=e232]: Use AI-powered automatic translation for speed, or hand off to human translators for quality. Our side-by-side editor shows source and translation together — review, edit, and approve with full context.
        - generic [ref=e233]:
          - generic [ref=e235]: "03"
          - heading "Publish localized pages" [level=3] [ref=e236]
          - paragraph [ref=e237]: Hit publish and your localized content goes live instantly. Each locale gets its own URL structure, hreflang tags, and sitemap entry — fully optimized for search engines in every market.
