        - paragraph [ref=e241]: Enterprise
        - heading "Advanced localization workflows" [level=2] [ref=e242]
        - paragraph [ref=e243]: Built for teams that manage content across dozens of markets. Translation memory, approval chains, and analytics that scale with your global operations.
      - generic [ref=e244]:
        - generic [ref=e245]:
          - generic [ref=e246]: Save up to 60%
          - heading "Translation memory" [level=3] [ref=e247]
          - paragraph [ref=e248]: Reuse previously translated strings across projects. Our TM stores every approved translation and suggests matches when similar content appears — reducing cost by up to 60%.
        - generic [ref=e249]:
